spring:
  datasource:
    url: "jdbc:mysql://localhost:3307/toeic"
    username: root
    password: root

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      enabled: true
      # Increased limits to support large video uploads (set to 1GB)
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 2KB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/login/oauth2/code/github"
            scope:
              - read:user
              - user:email
jwt:
  secret: "3b3529bc2a79f9035075bd915c1e9cf227d2c41043cf617ba6e66c816777b5ad"
  expiration-ms: 86400000

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api
  # If you still hit limits from the container (embedded Tomcat/Jetty/Undertow),
  # configure the container-specific max post size separately. Spring's
  # spring.servlet.multipart.* settings above are the main ones to increase.

logging:
  level:
    root: INFO
    org.example.backendai: DEBUG

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  upload-folder: toeic-trainer/videos
